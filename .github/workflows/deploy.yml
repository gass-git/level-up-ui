name: Deploy to github pages

on:
  push:
    branches:
      - master
    paths:
      - package.json

permissions:
  contents: read
  pages: write
  id-token: write
  deployments: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: https://gass-git.github.io/level-up-ui/

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm i
      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - uses: actions/deploy-pages@v4
